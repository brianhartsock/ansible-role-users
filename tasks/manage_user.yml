---
- name: "Checking if user exists already: {{ user.username }}"
  ansible.builtin.getent:
    database: passwd
    key: "{{ user.username }}"
  register: passwd_getent
  failed_when: false
  changed_when: false

- name: "Set user existence (before state)"
  ansible.builtin.set_fact:
    user_exists_before: "{{ passwd_getent is defined and passwd_getent.ansible_facts.getent_passwd[user.username] is defined }}"

- name: "Adding user to the system: {{ user.username }}"
  ansible.builtin.user:
    name: "{{ user.username }}"
    uid: "{{ user.uid | default(omit) }}"
    home: "{{ user.home | default(users_home ~ '/' ~ user.username) }}"
    comment: "{{ user.name | default(omit) }}"
    system: "{{ user.system | default(omit) }}"
    generate_ssh_key: "{{ user.ssh_key_generate | default(omit) }}"
    group: "{{
            omit if user.group is defined and user.group == user.username
            else (user.group if user.group is defined else (users_group.name if users_group else omit))
            }}"
    groups: "{{ user.groups | join(',') if user.groups is defined else users_groups | map(attribute='name') | join(',') }}"
    append: "{{ user.append | default(omit) }}"
    password: "{{ user.password | default(omit) }}"
    ssh_key_file: ".ssh/id_{{ user.ssh_key_type | default(users_ssh_key_type) }}"
    ssh_key_passphrase: "{{ user.ssh_key_password | default(omit) }}"
    ssh_key_bits: "{{ user.ssh_key_bits | default(users_ssh_key_bits) }}"
    createhome: "{{ user.home_create | default(users_home_create) }}"
    shell: "{{ user.shell | default(users_shell | default(omit)) }}"
    update_password: "{{ user.update_password | default(omit) }}"
  when: >
    (
      (user.user_update | default(users_user_update) ) == "always" or
      (
        (user.user_update | default(users_user_update) ) == "on_create" and
        not user_exists_before
      )
    )
    and (user.user_create | default(users_user_create) | bool)

- name: "Debug: output passwd_getent after adding user"
  ansible.builtin.debug:
    var: passwd_getent
  when: users_debug | bool

- name: Configuring user's home
  ansible.builtin.import_tasks: manage_user_home.yml
  when: user.home_create | default(users_home_create) | bool
